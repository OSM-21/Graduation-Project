<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل حساب</title>

  <style>
    :root{
      /* ألوان بوابة جازان */
      --ju-green-dark:#1f3f42;
      --ju-green:#2f6f6a;
      --ju-gold:#c3a26a;
      --ju-gold-light:#e6d3a3;

      --bg:#f4f7f6;
      --text:#0f1720;
      --muted:#54636a;
      --field:#ffffff;
      --border:#e3e8e7;
      --shadow:0 18px 60px rgba(0,0,0,.18);

      --cardW:560px;
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1100px 700px at 15% 10%, rgba(195,162,106,.22), transparent 55%),
        radial-gradient(900px 600px at 85% 15%, rgba(47,111,106,.18), transparent 55%),
        linear-gradient(180deg, var(--ju-green-dark), var(--ju-green));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 14px;
      color:var(--text);
    }

    .card{
      width:min(var(--cardW), 96vw);
      background: rgba(255,255,255,.95);
      border:1px solid rgba(255,255,255,.55);
      border-radius:var(--radius);
      padding:26px 22px;
      box-shadow: var(--shadow);
      position: relative;
      backdrop-filter: blur(8px);
    }

    /* شريط ذهبي علوي مثل البوابة */
    .card::before{
      content:"";
      position:absolute;
      top:0; left:0; right:0;
      height:7px;
      border-radius: var(--radius) var(--radius) 0 0;
      background: linear-gradient(90deg, var(--ju-gold), var(--ju-gold-light));
    }

    .head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      padding-top:6px;
    }

    h1{
      margin:0;
      font-size:32px;
      letter-spacing:.2px;
      color: var(--ju-green-dark);
    }

    .sub{
      margin:8px 0 16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .flash{
      background: #fff8e9;
      border: 1px solid #f0ddb7;
      padding:10px 12px;
      border-radius:14px;
      margin: 0 0 12px 0;
      font-size:14px;
      color:#6d4a0b;
    }

    label{
      display:block;
      margin:10px 0 6px;
      font-size:14px;
      color: var(--ju-green-dark);
      font-weight: 600;
    }

    input{
      width:100%;
      outline:none;
      background:var(--field);
      color:#111;
      padding:12px 14px;
      border-radius:14px;
      font-size:15px;
      border: 1px solid var(--border);
      transition: 0.2s;
    }

    input:focus{
      border-color: rgba(47,111,106,.55);
      box-shadow: 0 0 0 4px rgba(47,111,106,.14);
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }

    .row2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top: 4px;
    }

    .btn{
      margin-top:16px;
      width:100%;
      border:none;
      padding:13px 14px;
      border-radius:14px;
      background: var(--ju-green-dark);
      color:#fff;
      font-size:16px;
      font-weight: 700;
      cursor:pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,.12);
      transition: 0.2s;
    }

    .btn:hover{
      background:#163033;
      transform: translateY(-1px);
    }

    .btn:active{transform: translateY(0px)}

    .link{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:var(--muted);
    }

    .link a{
      color: var(--ju-green);
      text-decoration:none;
      font-weight:700;
    }

    .link a:hover{
      text-decoration: underline;
      color: var(--ju-green-dark);
    }

    @media (max-width:560px){
      h1{font-size:28px}
      .row2{grid-template-columns:1fr}
      .card{padding:22px 16px}
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="head">
      <div>
        <h1>تسجيل حساب</h1>
        <div class="sub">لازم تعبّي 3 أسئلة أمان مع الإجابات. استخدم أسئلة تتذكرها بسهولة.</div>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat,msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="grid">
        <label>البريد</label>
        <input type="email" name="email" required>

        <label>كلمة المرور</label>
        <input type="password" name="password" required>

        <div class="row2">
          <div>
            <label>سؤال الأمان 1</label>
            <input type="text" name="q1" placeholder="مثال: ما هي مدرستك الأولى؟" required>
          </div>
          <div>
            <label>إجابة الأمان 1</label>
            <input type="text" name="a1" required>
          </div>
        </div>

        <div class="row2">
          <div>
            <label>سؤال الأمان 2</label>
            <input type="text" name="q2" placeholder="مثال: ما اسم صديق الطفولة؟" required>
          </div>
          <div>
            <label>إجابة الأمان 2</label>
            <input type="text" name="a2" required>
          </div>
        </div>

        <div class="row2">
          <div>
            <label>سؤال الأمان 3</label>
            <input type="text" name="q3" placeholder="مثال: ما اسم أول معلم؟" required>
          </div>
          <div>
            <label>إجابة الأمان 3</label>
            <input type="text" name="a3" required>
          </div>
        </div>

        <button class="btn" type="submit">تسجيل</button>
      </div>
    </form>

    <div class="link">
      لديك حساب؟ <a href="{{ url_for('auth.login') }}">سجل دخول</a>
    </div>
  </div>
</body>
</html>
