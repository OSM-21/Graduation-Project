<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>أسئلة الأمان</title>
  <style>
    :root{--bg:#07101f;--card:#0b1630;--text:#fff;--muted:rgba(255,255,255,.70);--field:#e9f0ff;--btn:#2f66ff;--w:520px;--radius:18px;}
    *{box-sizing:border-box}
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1000px 520px at 15% 10%, rgba(47,102,255,.25), transparent 60%), var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:28px 14px;
    }
    .card{
      width:min(var(--w),96vw);
      background:rgba(11,22,48,.92);
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      padding:22px 18px;
      box-shadow:0 18px 60px rgba(0,0,0,.40);
      backdrop-filter: blur(8px);
    }
    h1{margin:0; font-size:30px}
    .sub{margin:8px 0 14px; color:var(--muted); font-size:14px; line-height:1.6}
    .q{margin:12px 0 6px; font-size:14px; color:rgba(255,255,255,.92)}
    input{
      width:100%; border:none; outline:none;
      background:var(--field); color:#111;
      padding:12px 14px; border-radius:14px; font-size:15px;
    }
    .btn{margin-top:14px;width:100%;border:none;padding:13px 14px;border-radius:14px;background:var(--btn);color:#fff;font-size:16px;cursor:pointer;}
    .link{margin-top:12px;text-align:center;font-size:14px;color:var(--muted)}
    .link a{color:#74a2ff;text-decoration:none;font-weight:600}
    .flash{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      padding:10px 12px;
      border-radius:14px;
      margin-bottom:10px;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>أسئلة الأمان</h1>
    <div class="sub">اكتب الإجابات بنفس الطريقة اللي كتبتها وقت التسجيل.</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat,msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.security_questions') }}">
      <div class="q">سؤال 1: {{ q1 }}</div>
      <input type="text" name="a1" required>

      <div class="q">سؤال 2: {{ q2 }}</div>
      <input type="text" name="a2" required>

      <div class="q">سؤال 3: {{ q3 }}</div>
      <input type="text" name="a3" required>

      <button class="btn" type="submit">تحقق</button>
    </form>

    <div class="link">
      <a href="{{ url_for('auth.forgot_password') }}">رجوع</a>
    </div>
  </div>
</body>
</html>
