<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth">
  <div class="auth-card">
    <h2>تسجيل الدخول</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash">
          {% for category, message in messages %}
            <div class="flash-item {{category}}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form method="post">
      <label>البريد</label>
      <input name="email" type="email" required />
      <label>كلمة المرور</label>
      <input name="password" type="password" required />
      
      <button type="submit">دخول</button>
      
      <p class="forgot-password-link">
<a href="{{ url_for('auth.forgot_password') }}">نسيت كلمة المرور؟</a>
      </p>
      <p>مستخدم جديد؟ <a href="{{ url_for('auth.register') }}">إنشاء حساب</a></p>
    </form>
  </div>
  <div style="text-align:center; margin-top:15px;">
    <a href="{{ url_for('auth.guest_login') }}" style="color:#a7c5ff; text-decoration:none;">
        الدخول كزائر
    </a>
</div>

</body>
</html>
